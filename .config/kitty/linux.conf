hide_window_decorations yes

wayland_titlebar_color #1c1c1c

background_opacity 0.85
background_blur 5

map ctrl+shift+x>r load_config_file
map ctrl+shift+x>ctrl+shift+r load_config_file
map ctrl+shift+x>ctrl+shift+u show_scrollback
map ctrl+shift+x>q quit
map ctrl+shift+q
map ctrl+shift+x>? command_palette

map ctrl+shift+x>r start_resizing_window
map ctrl+shift+x>x close_window_with_confirmation ignore-shell
map ctrl+shift+x>1 goto_tab 1
map ctrl+shift+x>2 goto_tab 2
map ctrl+shift+x>3 goto_tab 3
map ctrl+shift+x>4 goto_tab 4
map ctrl+shift+x>5 goto_tab 5
map ctrl+shift+x>6 goto_tab 6
map ctrl+shift+x>7 goto_tab 7
map ctrl+shift+x>8 goto_tab 8
map ctrl+shift+x>9 goto_tab 9
map ctrl+shift+x>0 goto_tab 10
map ctrl+shift+x>, launch --type=overlay --title=current --allow-remote-control ~/.config/kitty/rename_tab.sh
map ctrl+shift+x>c launch --type=tab --location=after
map ctrl+shift+x>n next_tab
map ctrl+shift+x>p previous_tab
map ctrl+shift+x>shift+h move_tab_backward
map ctrl+shift+x>shift+l move_tab_backward
map ctrl+shift+x>h neighboring_window left
map ctrl+shift+x>l neighboring_window right
map ctrl+shift+x>j neighboring_window down
map ctrl+shift+x>k neighboring_window up
map ctrl+shift+x>v launch --type=window --location=vsplit
map ctrl+shift+x>s launch --type=window --location=hsplit

map ctrl+shift+x>f toggle_fullscreen
map ctrl+shift+x>m toggle_maximized

map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_and_clear_or_interrupt
