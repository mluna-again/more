# UI
set -g @black1 "colour0"
set -g @black2 "colour8"
set -g @white "colour15"
set -g @red "colour1"
set -g @yellow "colour3"
bg="colour0"

set -g @window_status "#[bg=default,fg=#{@white}] #I #W "
set -g @window_current_status "#[bg=#{@black2},fg=#{@white}] #I #[bg=#{@black1}] #W "
set -g @window_small_status "#[bg=default,fg=#{@white}] #I "
set -g @window_small_current_status "#[bg=#{@black2},fg=#{@white}] #I #[bg=#{@black1}] #W "
set -g @tmux_banner "#[bg=#{?client_prefix,#{@yellow},#{@black2}},fg=#{?client_prefix,#{@black2},#{@white}}] TMUX #[bg=default,fg=default]"
set -g @session_banner "#[range=user|session_name,bg=#{@black1},fg=#{@white}] #{session_name} #[norange,bg=default,fg=default]"
set -g @hostname "#[bg=#{@black2},fg=#{@white},range=user|banner] #{host} #[bg=default,fg=default,norange]"
set -g @stack_banner "#[bg=#{@black2},fg=#{@red}]#{?#{||:#{@stack_at_right},#{@stack_at_left}}, S ,}#[bg=default,fg=default]"
set -g @zoom_status "#[bg=#{@yellow},fg=#{@black1},range=user|ZOOM]#{?window_zoomed_flag, #{?#{>:#{client_width},140},ZOOM,Z} ,}#[bg=default,fg=default,norange]#{?window_zoomed_flag, ,}"
set -g @sync_status "#[bg=#{@red},fg=#{@black1}]#{?pane_synchronized, SYNC ,}#[bg=default,fg=default]#{?pane_synchronized, ,}"
set -g @vpn_status "#(~/.local/scripts/bin/tmux_vpn.sh)"
set -g @date "#[bg=#{@black1},fg=#{@white}] %d/%b/%y #[bg=default,fg=default]"
set -g @time "#[bg=#{@black2},fg=#{@white},range=user|CLOCK] %I:%M %p #[bg=default,fg=default,norange]"
set -g @zfs "#(~/.local/scripts/bin/tmux_zfs.sh)"
set -g @basename_path "#[bg=#{@black2},fg=#{@white}] #{b:pane_current_path} #[bg=default,fg=default]"
set -g @visual_indicator "#[bg=#{@yellow},fg=#{@black1}] #{?rectangle_toggle,RECTANGLE,SELECTION} #[bg=default,fg=default]"
set -g @bash_warning "#(~/.local/scripts/bin/tmux_check_bash.sh)"
set -g @offline_banner "#(~/.local/scripts/bin/tmux_online.sh)"
set -g @marked "#[bg=#{@black1},fg=#{@red}]#{?pane_marked, MARKED ,}#[bg=default,fg=default]#{?pane_marked, ,}"
set -g @rember "#(~/.local/scripts/bin/tmux_rember.sh)"

set -g focus-events on
set -g set-titles on
set -g set-titles-string "TMUX: #{session_name} - #{window_name}"
set -g allow-set-title on
set -g detach-on-destroy no-detached
set -g status-left "#{E:@hostname}#{E:@session_banner}#{E:@tmux_banner} #{E:@stack_banner}#{E:@offline_banner}#{E:@bash_warning}#{E:@sync_status}#{E:@zoom_status}#{E:@vpn_status}#{E:@marked}"
set -g status-right "#{E:@rember}#{E:@forward_prefix}#{E:@time}#{E:@date}#{?selection_active,#{E:@visual_indicator},#{E:@basename_path}}"
set -g status-right-length 100
set -g status-position top
set -g status-justify left
set -g status-left-length 100
set -g status-style bg="none",fg="#{@white}"
set -g status-right-style bg=terminal,fg=terminal
set -g status-left-style bg=terminal,fg=terminal
set -g window-status-format "#{?#{>:#{client_width},140},#{E:@window_status},#{E:@window_small_status}}"
set -g window-status-current-format "#{?#{>:#{client_width},140},#{E:@window_current_status},#{E:@window_small_current_status}}"
set -g window-status-separator ""
set -g pane-border-lines heavy
set -g pane-border-indicators colour
set -g pane-border-format "#[bg=#{?pane_active,#{@yellow},#{@black1}},fg=#{?pane_active,#{@black1},#{@yellow}}] #{pane_current_path} #[fill=#{?pane_active,#{@yellow},#{@black1}},bg=terminal,fg=terminal]"
set -g pane-border-style fg="#{@black2}"
set -g pane-active-border-style fg="#{@black2}"
set -g pane-border-status off
set -g popup-style bg=terminal
set -g popup-border-style fg="#{@black1}",bg="#{@black1}"
set -g popup-border-lines none
set -g menu-style bg="#{@black1}",fg="#{@white}"
set -g menu-selected-style bg="#{@yellow}",fg="#{@black1}"
set -g menu-border-style fg="#{@black1}",bg="#{@black1}"
set -g menu-border-lines none
set -g message-style bg="#{@yellow}",fg="#{@black1}"
set -g message-command-style bg="#{@black1}",fg="#{@yellow}"
set -gF clock-mode-colour "#{@yellow}"
set -ga command-alias tiled="select-layout tiled"

# CONFIGURATION
set -gu @forward_prefix
set -g prefix C-x
set -sg escape-time 0
set -g mouse on
set -g status-keys vi
set -g mode-keys vi
set -g renumber-windows on
set -g automatic-rename-format '#{?pane_dead,[dead] ,}#{pane_current_command}'
set -g base-index 1
set -g display-time 0
set -g main-pane-width "50%"
set -g main-pane-height "50%"
set -g history-limit 10000
set -ga update-environment WAYLAND_DISPLAY
set -ga update-environment NIRI_SOCKET
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g allow-passthrough on
set -g clock-mode-style 12

# KEYBINDINGS
unbind -T root M-MouseDown3Pane
unbind -T root MouseDown3Pane
unbind -T root MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode MouseDragEnd1Pane
unbind /
bind _ command-prompt
bind : display-popup -x 0 -y 0 -w 100% -h 50% -EE ~/.local/scripts/bin/tmux_cmd.sh \; run-shell ~/.local/scripts/bin/tmux_cmd_collector.sh
bind -T root MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind C-x send-prefix
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"
bind v split-window -c "#{pane_current_path}" -h
bind s split-window -c "#{pane_current_path}" -v
bind J swap-pane -D
bind K swap-pane -U
bind H swap-window -t -1\; select-window -t -1
bind L swap-window -t +1\; select-window -t +1
bind 0 run-shell ~/.local/scripts/bin/tmux_select_last_window.sh
bind '|' resize-pane -Z
bind N run-shell ~/.local/scripts/bin/tmux_session_new.sh
bind X run-shell ~/.local/scripts/bin/tmux_delete_window.sh
bind x run-shell ~/.local/scripts/bin/tmux_delete_pane.sh
bind C-o switch-client -l
bind C-a select-window -l
bind C-n select-window -n
bind C-p select-window -p
bind . run-shell ~/.local/scripts/bin/tmux_swap_pane.sh
bind f display-popup -h 10 -y S -EE ~/.local/scripts/bin/tmux_find_pane.sh
bind C-b run-shell ~/.local/scripts/bin/tmux_toggle_prefix.sh
bind -Troot M-x run-shell ~/.local/scripts/bin/tmux_quake.sh
bind Space run-shell ~/.local/scripts/bin/tmux_run_menu.sh
bind C-Space run-shell ~/.local/scripts/bin/tmux_run_menu.sh
bind P run-shell ~/.local/scripts/bin/tmux_toggle_panel_borders.sh
bind O run-shell ~/.local/scripts/bin/tmux_kill_panes.sh
bind o display-popup -h 10 -y S -EE ~/.local/scripts/bin/tmux_switch_session.sh
bind + display-popup -s bg="$bg" -h 10 -y S -EE ~/.local/scripts/bin/tmux_layout_selector.sh
bind M join-pane -h
bind ñ run-shell ~/.local/scripts/bin/tmux_goto_todo.sh
bind R run-shell ~/.local/scripts/bin/tmux_reload.sh
bind C-r run-shell ~/.local/scripts/bin/tmux_reload.sh
bind r run-shell ~/.local/scripts/bin/tmux_resize.sh
bind , run-shell ~/.local/scripts/bin/tmux_rename_window.sh
bind ";" run-shell ~/.local/scripts/bin/tmux_rename_session.sh
bind b run-shell ~/.local/scripts/bin/tmux_script_runner.sh
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi g send-keys -X top-line
bind -T copy-mode-vi G send-keys -X bottom-line
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi A send-keys -X cancel

bind -T copy-mode-vi / command-prompt -i -p "Search:" "send -X search-backward-incremental '%%'"
bind / copy-mode \; command-prompt -i -p "Search:" "send -X search-backward-incremental '%%'"

bind h select-pane -L -Z
bind j select-pane -D -Z
bind k select-pane -U -Z
bind l select-pane -R -Z
bind C-h select-pane -L -Z
bind C-j select-pane -D -Z
bind C-k select-pane -U -Z
bind C-l select-pane -R -Z
bind C-d copy-mode
bind C-u copy-mode
bind '(' run-shell ~/.local/scripts/bin/tmux_session_prev.sh
bind ')' run-shell ~/.local/scripts/bin/tmux_session_next.sh
bind q run-shell ~/.local/scripts/bin/tmux_samurai.sh
bind - set synchronize-panes
bind '"' choose-buffer -Z
bind = run-shell ~/.local/scripts/bin/tmux_balance.sh

bind -Troot F1 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F1"
bind -Troot F2 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F2"
bind -Troot F3 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F3"
bind -Troot F4 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F4"
bind -Troot F5 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F5"
bind -Troot F6 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F6"
bind -Troot F7 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F7"
bind -Troot F8 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F8"
bind -Troot F9 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F9"
bind -Troot F10 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F10"
bind -Troot S-F1 bind -Troot F1 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F1" \; display 'Key cleared.'
bind -Troot S-F2 bind -Troot F2 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F2" \; display 'Key cleared.'
bind -Troot S-F3 bind -Troot F3 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F3" \; display 'Key cleared.'
bind -Troot S-F4 bind -Troot F4 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F4" \; display 'Key cleared.'
bind -Troot S-F5 bind -Troot F5 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F5" \; display 'Key cleared.'
bind -Troot S-F6 bind -Troot F6 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F6" \; display 'Key cleared.'
bind -Troot S-F7 bind -Troot F7 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F7" \; display 'Key cleared.'
bind -Troot S-F8 bind -Troot F8 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F8" \; display 'Key cleared.'
bind -Troot S-F9 bind -Troot F9 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F9" \; display 'Key cleared.'
bind -Troot S-F10 bind -Troot F10 run-shell "~/.local/scripts/bin/tmux_tag_pane.sh F10" \; display 'Key cleared.'

bind -Troot MouseUp1Status run-shell "~/.local/scripts/bin/tmux_click_handler.sh '#{mouse_status_range}'"
